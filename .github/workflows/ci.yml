name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt + clippy + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo build --all-targets

  test:
    name: integration tests (diod + FUSE)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # diod (a 9p2000.L server) + fuse3 are what the tests/diod_fuse.rs suite mounts against.
      # The suite skips gracefully if they're missing, but CI installs them so it runs for real.
      - name: Install diod + fuse3
        run: sudo apt-get update && sudo apt-get install -y diod fuse3
      - run: cargo test --all-targets
