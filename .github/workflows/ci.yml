name: CI

# All tools (Rust toolchain, rustfmt, clippy, diod, fuse3) come from the Nix flake -- no apt, no
# rustup. `nix flake check` runs fmt + clippy + build reproducibly; the FUSE integration tests run
# under `nix develop` because they need /dev/fuse (unavailable in the Nix build sandbox).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: "experimental-features = nix-command flakes"

      # Build + clippy (-D warnings) + rustfmt, all defined as flake checks.
      - name: nix flake check
        run: nix flake check -L

      # Integration tests mount a real diod export over FUSE, so they need /dev/fuse and a *setuid*
      # `fusermount3` (unprivileged FUSE). On a Nix/NixOS runner that's /run/wrappers/bin -- put it
      # ahead of the dev shell's non-setuid fusermount3 (set inside `nix develop`, since nix
      # re-prepends its own bins). The suite skips gracefully if the runner has no usable FUSE.
      - name: integration tests (diod + FUSE)
        run: nix develop -c bash -c 'export PATH="/run/wrappers/bin:$PATH"; cargo test'
